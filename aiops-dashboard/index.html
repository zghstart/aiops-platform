<!doctype html>
<html lang="zh-CN">
  <head>

    <style>
      body {
        background: #0a0a0f;

      #loading {
        position: fixed;

        transform: translate(-50%, -50%);
        font-size: 24px;

        animation: pulse 1.5s infinite;
