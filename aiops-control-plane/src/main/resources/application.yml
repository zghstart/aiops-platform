server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain
    min-response-size: 1024

spring:
  application:
    name: aiops-control-plane

  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:3306/aiops_control?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:aiops}
    password: ${MYSQL_PASSWORD:aiops123}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      acks: all
      retries: 3
      batch-size: 16384
      buffer-memory: 33554432
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: aiops-control
      auto-offset-reset: earliest
      enable-auto-commit: false
      max-poll-records: 500
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.aiops.*"

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: ${spring.application.name}

# Doris Configuration
doris:
  jdbc-url: jdbc:mysql://${DORIS_FE:localhost}:9030/aiops?useUnicode=true&characterEncoding=utf8
  username: ${DORIS_USER:aiops}
  password: ${DORIS_PASSWORD:aiops123}
  pool:
    max-total: 20
    max-idle: 10
    min-idle: 2

# AI Engine Configuration
ai-engine:
  url: ${AI_ENGINE_URL:http://localhost:8000}
  timeout: 60000
  api-key: ${AI_ENGINE_KEY:}
  max-concurrent: 50

# CMDB Configuration
cmdb:
  url: ${CMDB_URL:http://localhost:8081}
  timeout: 5000

# Tenant Isolation
tenant:
  isolation:
    enabled: true
    enforce-sql-filter: true
    default-tenant: default

# Logging
logging:
  level:
    com.aiops: INFO
    org.springframework.kafka: WARN
    org.apache.kafka: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/aiops-control-plane.log
