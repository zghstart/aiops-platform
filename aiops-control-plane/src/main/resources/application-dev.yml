server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:127.0.0.1}:5432/aiops?connectTimeout=10&socketTimeout=30&tcpKeepAlive=true
    username: ${POSTGRES_USER:aiops}
    password: ${POSTGRES_PASSWORD:aiops_pass_2024}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 60000
      maximum-pool-size: 5
      minimum-idle: 1
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:aiops_redis_2024}
      database: 0
      timeout: 5000
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 5

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:127.0.0.1:9092}

  flyway:
    enabled: false

logging:
  level:
    com.aiops: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG

ai-engine:
  url: ${AI_ENGINE_URL:http://localhost:8000}

doris:
  jdbc-url: jdbc:postgresql://${DORIS_FE:127.0.0.1}:9030/aiops_dev
